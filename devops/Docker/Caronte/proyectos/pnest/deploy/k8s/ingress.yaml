apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pnest
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: api.pedrorodriguezgimenez.es
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pnest
                port:
                  number: 80
