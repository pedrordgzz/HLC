apiVersion: apps/v1
kind: Deployment
metadata:
  name: pnest
  namespace: pnest
  labels:
    app: pnest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pnest
  template:
    metadata:
      labels:
        app: pnest
    spec:
      containers:
        - name: pnest
          image: peedroorgzz/pnest:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PROYECTO
              value: "pnest"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
          envFrom:
            - secretRef:
                name: postgres-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
