services:
  pnest:
    build:
      context: ${CONTEXTO}
      dockerfile: ./dockerfiles/js/pnest/Dockerfile
      args:
        - PROYECTO=${PROYECTO}
    container_name: ${NOMBRE}
    image: peedroorgzz/pnest:latest
    ports:
      - "${PORT_WEB}:3001"
    env_file:
      - ./.env
    volumes:
      - ./logs:/root/logs
      - ../../pnest/:/root/admin/pnest/
    networks:
      netpnest:
        ipv4_address: ${IP}
      ppostgres_netcaronte:  # se une a la red del contenedor Postgres

networks:
  netpnest:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${SUBNET}

  ppostgres_netcaronte:
    external: true           # red ya creada por el proyecto ppostgres
