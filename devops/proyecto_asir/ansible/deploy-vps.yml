# ═══════════════════════════════════════════════════════════
#  Playbook: Despliegue completo en VPS (Docker Compose)
#  Despliega las 3 webs + todos los microservicios
# ═══════════════════════════════════════════════════════════
---
- name: Desplegar PetStore completo en VPS
  hosts: vps
  become: true

  vars:
    project_remote_path: /opt/petstore
    project_local_path: "{{ playbook_dir }}/.."

  tasks:
    # ── 1. Verificar que Docker está instalado ──
    - name: Comprobar si Docker está instalado
      command: docker --version
      register: docker_check
      ignore_errors: true
      changed_when: false

    - name: Instalar Docker si no existe
      when: docker_check.rc != 0
      block:
        - name: Instalar dependencias de Docker
          apt:
            name:
              - apt-transport-https
              - ca-certificates
              - curl
              - gnupg
              - lsb-release
            state: present
            update_cache: true

        - name: Añadir clave GPG de Docker
          shell: |
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
          args:
            creates: /usr/share/keyrings/docker-archive-keyring.gpg

        - name: Añadir repositorio de Docker
          shell: |
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
          args:
            creates: /etc/apt/sources.list.d/docker.list

        - name: Instalar Docker Engine
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
            state: present
            update_cache: true

        - name: Arrancar y habilitar Docker
          systemd:
            name: docker
            state: started
            enabled: true

    # ── 2. Copiar proyecto al servidor ──
    - name: Crear directorio del proyecto
      file:
        path: "{{ project_remote_path }}"
        state: directory
        mode: '0755'

    - name: Sincronizar archivos del proyecto
      synchronize:
        src: "{{ project_local_path }}/"
        dest: "{{ project_remote_path }}/"
        delete: true
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=venv"
          - "--exclude=__pycache__"
          - "--exclude=*.db"
          - "--exclude=.git"

    # ── 3. Configurar variables de entorno ──
    - name: Copiar .env.production como .env
      copy:
        src: "{{ project_remote_path }}/.env.production"
        dest: "{{ project_remote_path }}/.env"
        remote_src: true
        mode: '0600'

    # ── 4. Construir y levantar contenedores ──
    - name: Construir y levantar todos los servicios
      command: docker compose up -d --build
      args:
        chdir: "{{ project_remote_path }}"
      register: compose_result

    - name: Mostrar resultado de Docker Compose
      debug:
        var: compose_result.stdout_lines

    # ── 5. Verificar que todos los contenedores están corriendo ──
    - name: Esperar 10 segundos a que arranquen los servicios
      pause:
        seconds: 10

    - name: Verificar contenedores activos
      command: docker ps --format "table {{'{{'}}.Names{{'}}'}}\t{{'{{'}}.Status{{'}}'}}\t{{'{{'}}.Ports{{'}}'}}"
      register: docker_ps
      changed_when: false

    - name: Mostrar estado de contenedores
      debug:
        var: docker_ps.stdout_lines

    # ── 6. Health check ──
    - name: Verificar que el gateway responde
      uri:
        url: "http://localhost/"
        status_code: 200
      register: health_check
      retries: 3
      delay: 5
      until: health_check.status == 200

    - name: Verificar API Auth
      uri:
        url: "http://localhost/api/auth/login"
        method: POST
        body_format: json
        body: '{"email":"test@test.com","password":"test"}'
        status_code: [401, 400]
      register: auth_check
      retries: 3
      delay: 5

    - name: "Despliegue completado"
      debug:
        msg: |
          ═══════════════════════════════════════════
           PetStore desplegado correctamente en VPS
          ═══════════════════════════════════════════
           Frontend:              http://{{ inventory_hostname }}/
           Demo Sin Validación:   http://{{ inventory_hostname }}/demo/sin-validacion/
           Demo Lista Cerrada:    http://{{ inventory_hostname }}/demo/lista-cerrada/
           API Auth (librería):   http://{{ inventory_hostname }}/api/auth/
           API Auth (whitelist):  http://{{ inventory_hostname }}/api/auth-lista-cerrada/
           API Products:          http://{{ inventory_hostname }}/api/products/
          ═══════════════════════════════════════════
