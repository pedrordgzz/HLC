# ═══════════════════════════════════════════════════════════
#  PetStore Gateway - Reverse Proxy Configuration
#  Patrón idéntico al global-deploy de HLC/Caronte
# ═══════════════════════════════════════════════════════════

upstream frontend {
    server frontend:80;
}

upstream auth {
    server auth-service:5000;
}

upstream auth_lista {
    server auth-service-lista-cerrada:5003;
}

upstream products {
    server products-service:4000;
}

upstream web_sinval {
    server web-sin-validacion:5001;
}

upstream web_lista {
    server web-lista-cerrada:5002;
}

server {
    listen 80;
    server_name _;

    # ── PetStore Principal (React SPA) ──
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API Auth (librería completa: MX + disposable + Debounce) ──
    location /api/auth/ {
        proxy_pass http://auth/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── API Auth (lista cerrada de dominios) ──
    location /api/auth-lista-cerrada/ {
        proxy_pass http://auth_lista/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── API Products ──
    location /api/products {
        proxy_pass http://products/api/products;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Demo: Sin Validación ──
    location /demo/sin-validacion/ {
        proxy_pass http://web_sinval/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Demo: Lista Cerrada ──
    location /demo/lista-cerrada/ {
        proxy_pass http://web_lista/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
